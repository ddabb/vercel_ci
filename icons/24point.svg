<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35" />
      <stop offset="100%" stop-color="#ff9a56" />
    </linearGradient>
  </defs>
  
  <!-- 圆角矩形背景 -->
  <rect x="10" y="10" width="80" height="80" rx="15" ry="15" fill="url(#bgGradient)" />
  
  <!-- 阴影效果 -->
  <rect x="12" y="12" width="80" height="80" rx="15" ry="15" fill="rgba(0,0,0,0.1)" />
  
  <!-- 数字 24 -->
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="36" font-weight="bold" text-anchor="middle" dominant-baseline="middle" fill="white">24</text>
  
  <!-- 文字 点 -->
  <text x="50" y="75" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" dominant-baseline="middle" fill="white">点</text>
</svg>