  <meta name="keywords" content="24点, 速算, 数学游戏, 在线游戏">
  <meta name="description" content="24点速算游戏，挑战你的数学计算能力，通过加减乘除运算使4个数字的结果为24">
  <link rel="icon" href="../logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/app.css">

    crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

              <a class="nav-link d-flex align-items-center" href="index.html">
                <img src="../logo.svg" alt="Logo" style="max-width: 24px;max-height: 24px; margin-right:1px;"
                  loading="lazy" width="24" height="24">
                自助工具站
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="photos.html">
                📷相册
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="dianzhangbiji.html">
                💡想法
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="gongzhonghao.html">
                📚小说

            </li>
            <li class="nav-item">
              <a class="nav-link" href="tools.html">

        </div>
      </nav>

  </header>
  <main class="container-fluid">
  <div class="container">
    <!-- 头部说明区域 -->
    <div class="header-section">
      <span class="game-title">24点速算</span>
      <span class="game-desc">通过加减乘除运算，使4个数字的结果为24</span>
      <span class="game-rules">规则：每个数字必须使用且只能使用一次，可以使用括号改变运算顺序</span>
    </div>

    <!-- 模式切换选项卡 -->
    <div class="mode-section">
      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="preset" onclick="switchGameMode(this)">
          <div class="mode-icon">🎯</div>
          <div class="mode-text">预设模式</div>
        </div>
        <div class="mode-tab" data-mode="custom" onclick="switchGameMode(this)">
          <div class="mode-icon">✏️</div>
          <div class="mode-text">自定义模式</div>
        </div>
      </div>
    </div>

    <!-- 控制区域 -->
    <div class="control-section" id="controlSection">
      <div class="numbers-display" id="numbersDisplay">
        <!-- 数字卡片将通过JS动态生成 -->
      </div>
    </div>

    <!-- 预设模式控制 -->
    <div class="mode-control-section" id="presetControls">
      <button class="mode-specific-btn" onclick="generateNewGame()">
        <div class="btn-icon">🎲</div>
        <div class="btn-text">新游戏</div>
      </button>
    </div>

    <!-- 自定义模式控制 -->
    <div class="mode-control-section" id="customControls" style="display: none;">
      <div class="custom-input-section">
        <div class="custom-inputs">
          <input type="number" class="custom-input" id="customInput1" min="0" max="24" placeholder="数字1"
            oninput="handleCustomInput(0, this.value)">
          <input type="number" class="custom-input" id="customInput2" min="0" max="24" placeholder="数字2"
            oninput="handleCustomInput(1, this.value)">
          <input type="number" class="custom-input" id="customInput3" min="0" max="24" placeholder="数字3"
            oninput="handleCustomInput(2, this.value)">
          <input type="number" class="custom-input" id="customInput4" min="0" max="24" placeholder="数字4"
            oninput="handleCustomInput(3, this.value)">
          <button class="random-generate-btn" onclick="generateRandomCustomNumbers()">
            <div class="btn-icon">🎲</div>
            <div class="btn-text">随机生成</div>
          </button>
        </div>
        <div class="custom-actions">
          <button class="custom-btn check-solvability-btn" id="checkSolvabilityBtn" disabled
            onclick="checkSolvability()">
            <div class="btn-icon">🔍</div>
            <div class="btn-text">检查可解性</div>
          </button>
          <button class="custom-btn use-custom-btn" id="useCustomNumbersBtn" disabled onclick="useCustomNumbers()">
            <div class="btn-icon">🚀</div>
            <div class="btn-text">开始游戏</div>
          </button>
        </div>
      </div>
    </div>

    <!-- 可解性结果区域 -->
    <div class="solvability-section" id="solvabilitySection" style="display: none;">
      <div class="solvability-box" id="solvabilityBox">
        <div class="solvability-icon" id="solvabilityIcon"></div>
        <div class="solvability-message" id="solvabilityMessage"></div>
        <div class="solvability-solutions" id="solvabilitySolutions"></div>
      </div>
    </div>

    <!-- 全局控制按钮 -->
    <div class="global-control-section" id="globalControlSection">
      <div class="global-control-buttons">
        <button class="global-control-btn hint-btn" id="hintBtn" onclick="showHint()">
          <div class="btn-icon">💡</div>
          <div class="btn-text">提示</div>
        </button>
        <button class="global-control-btn solution-btn" id="solutionBtn" onclick="showSolution()">
          <div class="btn-icon">📝</div>
          <div class="btn-text">答案</div>
        </button>
      </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-section">
      <div class="expression-input-container">
        <input type="text" class="expression-input" id="expressionInput" placeholder="输入算式，例如：(1+2+3)×4"
          oninput="setExpression(this.value)">
        <button class="clear-btn" id="clearBtn" style="display: none;" onclick="clearExpression()">
          ✕
        </button>
      </div>
      <div class="action-buttons">
        <button class="check-btn" id="checkBtn" disabled onclick="checkAnswer()">
          检查答案
        </button>
      </div>
    </div>

    <!-- 结果显示区域 -->
    <div class="result-section" id="resultSection" style="display: none;">
      <div class="result-box" id="resultBox">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-message" id="resultMessage"></div>
        <div class="result-expression" id="resultExpression">
          <div class="expression-display" id="expressionDisplay"></div>
        </div>
      </div>
    </div>

    <!-- 提示区域 -->
    <div class="hint-section" id="hintSection" style="display: none;">
      <div class="hint-box">
        <div class="hint-header">提示</div>
        <div class="hint-content">
          <div class="hint-text" id="hintText"></div>
        </div>
        <button class="close-hint-btn" onclick="closeHint()">
          关闭
        </button>
      </div>
    </div>

    <!-- 答案区域 -->
    <div class="solution-section" id="solutionSection" style="display: none;">
      <div class="solution-box">
        <div class="solution-header">答案</div>
        <div class="solution-list" id="solutionList">
          <!-- 答案将通过JS动态生成 -->
        </div>
        <button class="close-solution-btn" onclick="closeSolution()">
          关闭
        </button>
      </div>
    </div>

    <!-- 统计区域 -->
    <div class="stats-section" id="statsSection">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-number" id="gamesPlayed">0</div>
          <div class="stat-label">已玩局数</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="correctAnswers">0</div>
          <div class="stat-label">答对题数</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="accuracy">0%</div>
          <div class="stat-label">正确率</div>
        </div>
      </div>
    </div>

    <!-- 历史记录区域 -->
    <div class="history-section" id="historySection" style="display: none;">
      <div class="history-header">游戏历史</div>
      <div class="history-list" id="historyList">
        <!-- 历史记录将通过JS动态生成 -->
      </div>
    </div>
  </div>
